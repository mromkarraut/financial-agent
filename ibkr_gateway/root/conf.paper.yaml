    # ── PAPER TRADING CONFIGURATION ──────────────────────────────────────────
    # This config connects to IBKR's paper trading environment.
    # Log in at https://localhost:5000 with your PAPER TRADING credentials.
    # Paper trading accounts usually start with "DU" (e.g. DU1234567).
    # To switch to live trading: set IBKR_PAPER_TRADING=false in .env and
    # restart with root/conf.yaml instead of this file.
    # ─────────────────────────────────────────────────────────────────────────
    ip2loc: "US"
    proxyRemoteSsl: true
    proxyRemoteHost: "https://api.ibkr.com"
    listenPort: 5000
    listenSsl: true
    ccp: false
    svcEnvironment: "v1"
    sslCert: "vertx.jks"
    sslPwd: "mywebapi"
    authDelay: 3000
    portalBaseURL: ""
    serverOptions:
        blockedThreadCheckInterval: 1000000
        eventLoopPoolSize: 20
        workerPoolSize: 20
        maxWorkerExecuteTime: 100
        internalBlockingPoolSize: 20
    cors:
        origin.allowed: "*"
        allowCredentials: false
    webApps:
        - name: "demo"
          index: "index.html"
    ips:
      allow:
        - 192.*
        - 131.216.*
        - 127.0.0.1
      deny:
        - 212.90.324.10
